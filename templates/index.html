<!DOCTYPE html>
<html>
<head>
    <title>Expense Tracker</title>
    <link rel="stylesheet" href="/static/style.css">
</head>

<body>
<div class="container">
    <div class="card">

        <h1>💰 Expense Tracker</h1>
        <p class="subtitle">Track your expenses and manage your finances easily.</p>

        <div id="loginForm">
            <h2>Login</h2>

            <input id="loginEmail" type="email" placeholder="Email">
            <input id="loginPassword" type="password" placeholder="Password">

            <button class="primary-btn" onclick="loginUser()">
                Login
            </button>

            <p class="switch-text">
                Don't have an account?
                <a href="#" onclick="showRegister()">Create Account</a>
            </p>
        </div>

        <div id="registerForm" style="display:none;">
            <h2>Create Account</h2>

            <input id="username" placeholder="Username">
            <input id="email" type="email" placeholder="Email">
            <input id="password" type="password" placeholder="Password">

            <button class="primary-btn" onclick="registerUser()">
                Create Account
            </button>

            <p class="switch-text">
                Already have an account?
                <a href="#" onclick="showLogin()">Login</a>
            </p>
        </div>

        <p id="result"></p>

    </div>
</div>

<script>
function showRegister() {
    document.getElementById("loginForm").style.display = "none";
    document.getElementById("registerForm").style.display = "block";
    document.getElementById("result").innerText = "";
}

function showLogin() {
    document.getElementById("registerForm").style.display = "none";
    document.getElementById("loginForm").style.display = "block";
    document.getElementById("result").innerText = "";
}

async function registerUser() {
    const response = await fetch("/register", {
        method: "POST",
        headers: {
            "Content-Type": "application/json"
        },
        body: JSON.stringify({
            username: document.getElementById("username").value,
            email: document.getElementById("email").value,
            password: document.getElementById("password").value
        })
    });

    const data = await response.json();

    if (data.message) {
        document.getElementById("result").innerText =
            "Account created successfully. Please login.";
        showLogin();
    } else {
        document.getElementById("result").innerText =
            data.error || "Something went wrong";
    }
}

async function loginUser() {
    const response = await fetch("/login", {
        method: "POST",
        headers: {
            "Content-Type": "application/json"
        },
        body: JSON.stringify({
            email: document.getElementById("loginEmail").value,
            password: document.getElementById("loginPassword").value
        })
    });

    const data = await response.json();

    if (data.message) {
        document.getElementById("result").innerText =
            "Login successful. Redirecting...";

        setTimeout(() => {
            window.location.href = "/dashboard";
        }, 1000);
    } else {
        document.getElementById("result").innerText =
            data.error || "Something went wrong";
    }
}
</script>

</body>
</html>
